<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ProjectPlanner</title>
<style>
/*__CSS__*/
</style>
</head>
<body>
<div id="name-picker" class="overlay" hidden>
  <div class="overlay-card">
    <h2>Who's working on this?</h2>
    <input id="name-picker-input" type="text" placeholder="Your name" autocomplete="off">
    <button id="name-picker-submit">Continue</button>
  </div>
</div>

<div id="app" hidden>
  <header id="app-header">
    <div id="header-top">
      <span id="project-name"></span>
      <label>Status date <input type="date" id="status-date-input"></label>
      <button id="undo-button">Undo</button>
      <button id="redo-button">Redo</button>
      <button id="save-button">Save</button>
      <button id="load-project-button">Load Project</button>
      <input type="file" id="load-project-input" accept="application/json" hidden>
      <span id="dirty-indicator"></span>
    </div>
    <div id="kpi-row"></div>
  </header>
  <div id="toolbar">
    <button id="add-task-button">+ Add Task</button>
    <input id="search-input" type="text" placeholder="Search tasks...">
    <select id="owner-filter"><option value="">All Owners</option></select>
    <select id="pic-filter"><option value="">All PICs</option></select>
    <select id="status-filter">
      <option value="">All statuses</option>
      <option>Not Start</option>
      <option>In Progress</option>
      <option>Delayed</option>
      <option>Complete</option>
      <option>Blocked</option>
      <option>Cancelled</option>
    </select>
    <label><input type="checkbox" id="only-delayed-filter"> Only delayed</label>
    <label><input type="checkbox" id="only-deliverable-filter"> Only deliverables</label>
  </div>
  <div id="view-tabs">
    <button class="view-tab active" data-view="plan">Plan</button>
    <button class="view-tab" data-view="gantt">Gantt</button>
    <button class="view-tab" data-view="scurve">S-Curve</button>
    <button class="view-tab" data-view="dashboard">Dashboard</button>
    <button class="view-tab" data-view="snapshots">Snapshots</button>
    <button class="view-tab" data-view="resources">Resources</button>
    <button class="view-tab" data-view="billing">Billing</button>
    <button class="view-tab" data-view="settings">Settings</button>
    <button class="view-tab" data-view="holidays">Holidays</button>
    <button class="view-tab" data-view="reports">Reports</button>
  </div>
  <div id="plan-view">
    <div id="tree-header">
      <span>WBS</span>
      <span>Task</span>
      <span>Owner</span>
      <span>PIC</span>
      <span>P-Start</span>
      <span>P-Finish</span>
      <span>A-Start</span>
      <span>A-Finish</span>
      <span>Duration</span>
      <span>Weight</span>
      <span>% Plan</span>
      <span>% Actual</span>
      <span>Status</span>
      <span>Updated By</span>
      <span>Updated At</span>
      <span>Remarks</span>
      <span>Predecessors</span>
    </div>
    <div id="tree-body"></div>
  </div>
  <div id="gantt-view" hidden>
    <div id="gantt-toolbar">
      <button class="gantt-zoom-btn" data-zoom="day">Day</button>
      <button class="gantt-zoom-btn" data-zoom="week">Week</button>
      <button class="gantt-zoom-btn" data-zoom="month">Month</button>
      <button class="gantt-zoom-btn" data-zoom="quarter">Quarter</button>
    </div>
    <div id="gantt-scroll">
      <div id="gantt-labels"></div>
      <div id="gantt-body"></div>
    </div>
  </div>
  <div id="scurve-view" hidden>
    <div id="scurve-toolbar">
      <label>Overlay snapshot
        <select id="scurve-overlay-select"><option value="">None</option></select>
      </label>
      <button id="scurve-copy-image-button">Copy as Image</button>
    </div>
    <div id="scurve-body"></div>
  </div>
  <div id="dashboard-view" hidden>
    <div id="dashboard-body"></div>
  </div>
  <div id="snapshots-view" hidden>
    <div id="snapshots-toolbar">
      <input id="snapshot-note-input" type="text" placeholder="Snapshot note (optional)">
      <button id="take-snapshot-button">Take Snapshot</button>
    </div>
    <div id="snapshots-list"></div>
    <div id="snapshot-comparison"></div>
  </div>
  <div id="resources-view" hidden>
    <div class="settings-section">
      <h3>PIC List</h3>
      <div id="pic-list-editor"></div>
      <input id="new-pic-input" type="text" placeholder="Add PIC name">
      <button id="add-pic-button">Add</button>
    </div>
    <div class="settings-section settings-section-wide">
      <h3>Capacity (FTE per week)</h3>
      <div id="capacity-grid" class="resource-grid-wrap"></div>
    </div>
    <div class="settings-section settings-section-wide">
      <h3>Workload (demand / available)</h3>
      <div id="workload-grid" class="resource-grid-wrap"></div>
      <div id="workload-drilldown"></div>
    </div>
  </div>
  <div id="billing-view" hidden>
    <div id="billing-body"></div>
  </div>
  <div id="settings-view" hidden>
    <div class="settings-section">
      <h3>Theme</h3>
      <button class="theme-btn" data-theme="kpmg-light">Light</button>
      <button class="theme-btn" data-theme="kpmg-dark">Dark</button>
    </div>
    <div class="settings-section">
      <h3>Project</h3>
      <label>Name <input id="project-rename-input" type="text"></label>
      <button id="new-project-button">New Project (blank)</button>
      <button id="csv-template-button">Download CSV Template</button>
      <button id="import-csv-button">Import CSV</button>
      <button id="export-csv-button">Export CSV</button>
      <input type="file" id="import-csv-input" accept=".csv,text/csv" hidden>
    </div>
    <div class="settings-section settings-section-wide">
      <h3>Audit Log</h3>
      <div id="audit-log-body"></div>
    </div>
  </div>
  <div id="holidays-view" hidden>
    <div id="holidays-toolbar">
      <input id="new-holiday-date" type="date">
      <input id="new-holiday-label" type="text" placeholder="Label">
      <button id="add-holiday-button">Add</button>
      <span id="holiday-impact-banner"></span>
    </div>
    <div id="holidays-bulk">
      <textarea id="holidays-bulk-input" rows="3" placeholder="Paste rows: date&#9;label (one per line)"></textarea>
      <button id="holidays-bulk-import-button">Import</button>
    </div>
    <div id="holidays-year-nav">
      <button id="holidays-year-prev">&laquo; Prev Year</button>
      <span id="holidays-year-label"></span>
      <button id="holidays-year-next">Next Year &raquo;</button>
    </div>
    <div id="holidays-calendar"></div>
    <div id="holidays-table"></div>
  </div>
  <div id="reports-view" hidden>
    <div id="reports-toolbar">
      <select id="report-template-select">
        <option value="weekly">Weekly Status Report</option>
        <option value="executive">Executive Dashboard</option>
        <option value="summary">Management Summary</option>
      </select>
      <button id="report-copy-image-button">Copy as Image</button>
      <button id="report-copy-table-button">Copy as Table</button>
    </div>
    <div id="report-panel-wrap">
      <div id="report-panel"></div>
    </div>
  </div>
</div>

<div id="context-menu" class="context-menu" hidden></div>
<div id="scurve-tooltip" hidden></div>

<script>
/*__JS__*/
</script>
</body>
</html>
